name: build
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write   # needed to attach installers to the GitHub Release

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14        # Apple Silicon (arm64)
            label: macOS-AppleSilicon
          - os: macos-13        # Intel (x86_64)
            label: macOS-Intel
          - os: windows-latest
            label: Windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install -e ".[dev]"
      - name: Icons
        run: python assets/make_icon.py
      - name: Fetch ffmpeg
        run: python packaging/fetch_ffmpeg.py
      - name: Fetch Chromium (bundled, Windows only)
        # Bundled only on Windows: it removes the first-run download that pops a
        # console window there. On macOS, PyInstaller ad-hoc-codesigns every
        # bundled binary and chokes on Chromium's nested "Google Chrome for
        # Testing.app", so macOS keeps the first-run download (no console issue
        # on macOS). The spec's os.path.isdir("ms-playwright") guard skips
        # bundling wherever this step didn't run.
        if: runner.os == 'Windows'
        env:
          PLAYWRIGHT_BROWSERS_PATH: ms-playwright
        run: python -m playwright install chromium

      # --- macOS code signing: import the Developer ID cert into a temp keychain ---
      - name: Import signing certificate (macOS)
        if: runner.os == 'macOS'
        env:
          CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"
          echo "$CERT_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" "$(security default-keychain -d user | tr -d ' \"')"
          rm "$RUNNER_TEMP/cert.p12"

      - name: Build
        # CODESIGN_IDENTITY / ENTITLEMENTS are read by the .spec (macOS BUNDLE only).
        # On Windows they are empty and ignored.
        env:
          CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
          ENTITLEMENTS: packaging/entitlements.plist
        run: pyinstaller --noconfirm packaging/TraceDownloader.spec

      - name: Notarize & staple (macOS)
        if: runner.os == 'macOS'
        env:
          NOTARY_KEY_BASE64: ${{ secrets.MACOS_NOTARY_KEY_BASE64 }}
          NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          NOTARY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
        run: |
          set -euo pipefail
          echo "$NOTARY_KEY_BASE64" | base64 --decode > "$RUNNER_TEMP/notary.p8"
          # notarytool wants a zip of the .app; staple writes the ticket back into the .app.
          ditto -c -k --keepParent "dist/TraceDown.app" "$RUNNER_TEMP/notarize.zip"
          SUBMIT_JSON=$(xcrun notarytool submit "$RUNNER_TEMP/notarize.zip" \
            --key "$RUNNER_TEMP/notary.p8" --key-id "$NOTARY_KEY_ID" --issuer "$NOTARY_ISSUER_ID" \
            --wait --output-format json)
          echo "$SUBMIT_JSON"
          SUBMIT_ID=$(echo "$SUBMIT_JSON" | python3 -c "import sys,json;print(json.load(sys.stdin)['id'])")
          STATUS=$(echo "$SUBMIT_JSON" | python3 -c "import sys,json;print(json.load(sys.stdin)['status'])")
          echo "=== notarytool log for $SUBMIT_ID ==="
          xcrun notarytool log "$SUBMIT_ID" \
            --key "$RUNNER_TEMP/notary.p8" --key-id "$NOTARY_KEY_ID" --issuer "$NOTARY_ISSUER_ID" || true
          rm "$RUNNER_TEMP/notary.p8"
          if [ "$STATUS" != "Accepted" ]; then echo "Notarization status: $STATUS"; exit 1; fi
          xcrun stapler staple "dist/TraceDown.app"

      - name: Zip (macOS)
        if: runner.os == 'macOS'
        # ditto preserves the signature + stapled notarization ticket inside the zip.
        run: cd dist && ditto -c -k --keepParent "TraceDown.app" "../TraceDown-${{ matrix.label }}.zip"
      - name: Zip (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path "dist/TraceDown/*" -DestinationPath TraceDown-Windows.zip
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TraceDownloader-${{ matrix.label }}
          path: TraceDown-*.zip
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: TraceDown-*.zip
