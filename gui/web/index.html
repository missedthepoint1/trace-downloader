<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <svg class="logo" width="156" height="26" viewBox="0 0 156 26" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="TraceDown">
      <polygon points="2,3 2,23 19,13" fill="#3ddc84"/>
      <text x="27" y="20" font-family="-apple-system,system-ui,sans-serif" font-size="20" font-weight="700">
        <tspan fill="#e8eef5">Trace</tspan><tspan fill="#3ddc84">Down</tspan>
      </text>
    </svg>
    <select id="account" class="account"></select>
    <div id="status" class="status">…</div>
    <button id="reconnect" style="display:none">Reconnect</button>
  </header>
  <div id="statusDetail" class="statusDetail"></div>
  <button id="downloadAll" class="primary">⬇ Download all new games</button>
  <div id="games" class="games"></div>
  <footer>
    <button id="openFolder">📁 Open folder</button>
    <button id="settingsBtn">⚙ Settings</button>
  </footer>
  <dialog id="settings">
    <h2>Settings</h2>
    <label>Quality
      <select id="quality"><option>highest</option><option>2000k</option><option>1000k</option></select>
    </label>
    <label class="switch"><input type="checkbox" id="combine"> Combine both halves into one file</label>
    <label class="switch"><input type="checkbox" id="auto"> Download new games automatically every 3 hours</label>
    <button id="removeAccount" style="background:#3a2330;color:#e6a">Log out / remove this account</button>
    <menu><button id="closeSettings">Done</button></menu>
  </dialog>
  <div id="version" class="version"></div>
  <script src="app.js"></script>
</body>
</html>
